name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build, Lint, and Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm prisma generate
        env:
          DATABASE_URL: "postgresql://user:pass@localhost:5432/db"

      - name: Validate Prisma schema
        run: pnpm prisma validate
        env:
          DATABASE_URL: "postgresql://user:pass@localhost:5432/db"

      - name: Run TypeScript check
        run: npx tsc --noEmit

      - name: Run Linting
        run: pnpm lint

      - name: Run Production Parity Tests
        run: pnpm test:production

      - name: Run Production Build
        run: pnpm build
        env:
          BETTER_AUTH_SECRET: "ci-build-secret-change-me-32-characters"
          BETTER_AUTH_GITHUB_CLIENT_ID: "ci-github-client-id"
          BETTER_AUTH_GITHUB_CLIENT_SECRET: "ci-github-client-secret"
          BETTER_AUTH_URL: "http://localhost:3000"
          UPSTASH_REDIS_REST_URL: "https://ci-upstash.example.com"
          UPSTASH_REDIS_REST_TOKEN: "ci-upstash-token"
          DATABASE_URL: "postgresql://user:pass@localhost:5432/db"
