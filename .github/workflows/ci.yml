name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build, Lint, and Typecheck
    runs-on: ubuntu-latest

    env:
      # Placeholder values that satisfy env.js validation at build time.
      # Real secrets are injected at deploy time, never in CI.
      SKIP_ENV_VALIDATION: "1"
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"
      BETTER_AUTH_SECRET: "ci-placeholder-secret-must-be-at-least-32-chars-long"
      BETTER_AUTH_URL: "http://localhost:3000"
      BETTER_AUTH_GITHUB_CLIENT_ID: "ci-placeholder"
      BETTER_AUTH_GITHUB_CLIENT_SECRET: "ci-placeholder"
      UPSTASH_REDIS_REST_URL: "https://ci-placeholder.upstash.io"
      UPSTASH_REDIS_REST_TOKEN: "ci-placeholder"
      GEMINI_API_KEY: "ci-placeholder"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm db:generate

      - name: Run TypeScript check
        run: npx tsc --noEmit

      - name: Run Linting
        run: pnpm lint

      - name: Run Production Parity Tests
        run: pnpm test:production

      - name: Run Production Build
        run: pnpm build
