<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign in — Portfolio CMS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<main class="auth-page solo">

  <!-- Form side -->
  <section class="auth-form-wrap">
    <div class="auth-brand-mini"><span class="dot"></span>Portfolio CMS</div>
    <form class="auth-form" id="auth" novalidate>
      <div class="auth-eyebrow" id="eyebrow">Welcome back</div>
      <h1 id="title">Sign in</h1>
      <p class="sub" id="sub">Use your email or GitHub to continue.</p>

      <div class="field" id="f-name" style="display:none">
        <label for="name">Name</label>
        <input type="text" id="name" autocomplete="name" placeholder="Ali Abdullah">
        <span class="err-msg">Please enter your name.</span>
      </div>

      <div class="field" id="f-email">
        <label for="email">Email</label>
        <input type="email" id="email" autocomplete="email" placeholder="you@example.com" required>
        <span class="err-msg">Enter a valid email address.</span>
      </div>

      <div class="field" id="f-pw">
        <div class="row">
          <label for="pw">Password</label>
          <a href="#" id="forgot">Forgot?</a>
        </div>
        <input type="password" id="pw" autocomplete="current-password" placeholder="••••••••" required>
        <span class="err-msg">Password must be at least 8 characters.</span>
      </div>

      <button class="btn-block primary" type="submit" id="submit">Sign in</button>

      <div class="auth-divider">or</div>

      <button class="btn-block" type="button" id="gh">
        <svg class="gh" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
          <path d="M8 0C3.58 0 0 3.58 0 8a8 8 0 0 0 5.47 7.59c.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
        </svg>
        Continue with GitHub
      </button>

      <a href="index.html" class="back-link">← Back to portfolio</a>
    </form>
  </section>

</main>

<div class="toast-stack" id="toasts"></div>

<script>
const form = document.getElementById('auth');
const eyebrow = document.getElementById('eyebrow');
const title = document.getElementById('title');
const sub = document.getElementById('sub');
const fName = document.getElementById('f-name');
const fEmail = document.getElementById('f-email');
const fPw = document.getElementById('f-pw');
const inputName = document.getElementById('name');
const inputEmail = document.getElementById('email');
const inputPw = document.getElementById('pw');
const submit = document.getElementById('submit');
const toasts = document.getElementById('toasts');

const mode = 'signin';

function clearErr(field){ field.classList.remove('is-err') }
[inputName, inputEmail, inputPw].forEach(el => el.addEventListener('input', () => {
  clearErr(el.parentElement);
}));

function toast(kind, headline, body, timeout = 3500){
  const t = document.createElement('div');
  t.className = 'toast ' + (kind === 'err' ? 'err' : '');
  t.innerHTML = `<div class="ic">${kind === 'err' ? '!' : '◆'}</div><div class="body"><b>${headline}</b><span>${body || ''}</span></div>`;
  toasts.appendChild(t);
  setTimeout(() => {
    t.classList.add('out');
    setTimeout(() => t.remove(), 220);
  }, timeout);
}

form.addEventListener('submit', e => {
  e.preventDefault();
  let ok = true;
  if(mode === 'signup' && !inputName.value.trim()){ fName.classList.add('is-err'); ok = false; }
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(inputEmail.value.trim())){ fEmail.classList.add('is-err'); ok = false; }
  if(inputPw.value.length < 8){ fPw.classList.add('is-err'); ok = false; }
  if(!ok) return;

  submit.disabled = true;
  submit.textContent = mode === 'signin' ? 'Signing in…' : 'Creating account…';
  setTimeout(() => {
    toast('ok', mode === 'signin' ? 'Signed in' : 'Account created', 'Redirecting to dashboard…');
    setTimeout(() => { window.location.href = 'dashboard.html'; }, 700);
  }, 600);
});

document.getElementById('gh').addEventListener('click', () => {
  toast('ok', 'GitHub OAuth', 'Redirecting…');
  setTimeout(() => { window.location.href = 'dashboard.html'; }, 700);
});

document.getElementById('forgot').addEventListener('click', e => {
  e.preventDefault();
  toast('ok', 'Reset link sent', 'Check your inbox in a moment.');
});
</script>

</body>
</html>
